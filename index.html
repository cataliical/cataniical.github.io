<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATANIICAL DIGITAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #f8f9fa;
            --text-main: #1a1a1a;
            --font-mono: 'Noto Sans Mono', monospace;
        }
        body { margin: 0; display: flex; height: 100vh; font-family: var(--font-mono); background-color: var(--bg-color); color: var(--text-main); overflow: hidden; }
        
        /* サイドバー */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand-header { padding: 40px 25px 20px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-bottom: 1px solid #eee; }
        .nav-menu { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .category-label { padding: 20px 25px 5px; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.1em; }
        .sub-menu { list-style: none; padding: 0; margin-bottom: 15px; }
        .sub-menu li a { display: block; padding: 8px 25px; text-decoration: none; color: #333; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .sub-menu li a:hover { background-color: #eee; }
        
        /* メインコンテンツ */
        .main-content { flex: 1; padding: 60px; overflow-y: auto; scroll-behavior: smooth; }
        .archive-entry { max-width: 800px; margin: 0 auto; line-height: 1.8; }
        
        /* Markdown内の画像規律 */
        .archive-entry img { max-width: 100%; height: auto; margin: 20px 0; border: 1px solid #eee; display: block; }
        .archive-entry h1 { font-size: 1.5rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-top: 0; }
        .archive-entry table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .archive-entry td { padding: 10px 0; border-bottom: 1px dotted #ccc; font-size: 0.9rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-header" onclick="loadContent('README.md')">CATANIICAL</div>
        <nav class="nav-menu">
            <div class="category-label">Aglaonema</div>
            <ul class="sub-menu">
                <li><a onclick="loadContent('README.md')">SAMPLE_INDEX</a></li>
            </ul>
            <div class="category-label">System</div>
            <ul class="sub-menu">
                <li><a onclick="loadContent('README.md')">ABOUT</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div id="content-area" class="archive-entry">
            INITIATING...
        </div>
    </main>

    <script>
        async function loadContent(path) {
            const area = document.getElementById('content-area');
            try {
                const response = await fetch(path + '?v=' + Date.now());
                if (!response.ok) throw new Error('FILE NOT FOUND');
                const mdText = await response.text();
                
                // MarkdownをパースしてHTMLとして挿入
                area.innerHTML = marked.parse(mdText);
                
                // スクロールをトップに戻す
                document.querySelector('.main-content').scrollTop = 0;
            } catch (e) {
                area.innerHTML = `<div style="color:red; border:1px solid red; padding:20px;">[ERROR] ${e.message}<br>Path: ${path}</div>`;
            }
        }

        // 初回読み込み
        window.onload = () => {
            if (typeof marked !== 'undefined') {
                loadContent('README.md');
            } else {
                // ライブラリ読み込み待ちの再試行
                setTimeout(() => loadContent('README.md'), 500);
            }
        };
    </script>
</body>
</html>
