<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATANIICAL DIGITAL ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #f8f9fa;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --border-color: #e0e0e0;
            --font-mono: 'Noto Sans Mono', monospace;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: var(--font-mono);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .brand-header {
            padding: 40px 25px 20px;
        }

        /* ロゴリンクのスタイル */
        .brand-header a {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-main);
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .category-label {
            padding: 20px 25px 10px;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }

        .sub-menu {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }

        .sub-menu li a {
            display: block;
            padding: 8px 25px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .sub-menu li a:hover {
            background-color: #efefef;
        }

        .main-content {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
        }

        .archive-entry {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Markdown表示用の微調整 */
        .archive-entry img {
            width: 100%;
            height: auto;
            margin: 20px 0;
        }

        .sidebar-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-footer a {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 0.7rem;
            margin-right: 15px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-header">
            <a href="index.html">CATANIICAL</a>
        </div>
        
        <nav class="nav-menu">
            <div class="category-label">Platycerium</div>
            <ul class="sub-menu">
                <li><a onclick="loadMD('platycerium/specimen-01.md')">Specimen 01</a></li>
            </ul>

            <div class="category-label">Aglaonema</div>
            <ul class="sub-menu">
                <li><a onclick="loadMD('aglaonema/made-in-heaven.md')">Made In Heaven</a></li>
            </ul>

            <div class="category-label">Others</div>
            <ul class="sub-menu">
                <li><a onclick="loadMD('README.md')">About CATANIICAL</a></li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="https://instagram.com/cataniical" target="_blank">INSTAGRAM</a>
            <a href="https://x.com/cataniical" target="_blank">X</a>
        </div>
    </aside>

    <main class="main-content">
        <div id="content-area" class="archive-entry">
            Loading...
        </div>
    </main>

    <script>
        // Markdownファイルを読み込んで表示する関数
        async function loadMD(filePath) {
            const contentArea = document.getElementById('content-area');
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                contentArea.innerHTML = marked.parse(text);
            } catch (error) {
                contentArea.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            }
        }

        // 初期表示：README.md を読み込む
        window.onload = () => {
            loadMD('README.md');
        };
    </script>

</body>
</html>
