<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cataniical</title>
    <style>
        /* * 無味無臭の静寂をデザインする
         * 余計な装飾を排し、余白（空き）を重力に従って配置する
         */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* 純白 */
            color: #1a1a1a; /* 墨色 */
            font-family: "Times New Roman", "游明朝", "Yu Mincho", "Serif";
            line-height: 2.0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 0.05em;
        }

        article {
            max-width: 600px;
            padding: 40px;
        }

        header {
            margin-bottom: 80px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: normal;
            margin: 0;
            font-family: "Courier New", Courier, monospace; /* UNIX/LABO的な等幅 */
        }

        .definition {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.5rem;
        }

        section {
            margin-bottom: 60px;
        }

        p {
            margin: 0;
        }

        .creed-title {
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .creed-list {
            list-style: none;
            padding-left: 1.5rem;
            margin-bottom: 2rem;
        }

        .creed-list li {
            margin-bottom: 0.5rem;
        }

        ruby rt {
            font-size: 0.6em;
            letter-spacing: 0.1em;
        }

        footer {
            margin-top: 100px;
            font-size: 0.9rem;
        }

        /* * レスポンシブな余白の調整
         */
        @media (max-width: 480px) {
            article {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<article>
    <header>
        <h1>cataniical</h1>
        <p class="definition">cataniical は「片隅ボタニカル」の略称です。</p>
    </header>

    <main>
        <section class="about">
            <p>都会の片隅で植物を育て、記録を残しています。</p>
        </section>

        <section class="creed">
            <p class="creed-title">規律 / Creed</p>
            <p>三つの信条</p>
            <ul class="creed-list">
                <li><ruby>一掃一礼<rt>いっそういちれい</rt></ruby></li>
                <li><ruby>吾唯知足<rt>われただたるをしる</rt></ruby></li>
                <li><ruby>綿綿密密<rt>めんめんみつみつ</rt></ruby></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>その先にある静寂を、記録し続けます。</p>
    </footer>
</article>

</body>
</html>
