<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cataniical</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            /* すべての文字を純黒に固定 */
            color: #000000;
            font-family: 'Courier Prime', 'Noto Serif JP', serif;
            font-weight: 400;
            line-height: 2.2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            letter-spacing: 0.08em;
            -webkit-font-smoothing: antialiased;
        }

        article {
            max-width: 600px;
            padding: 40px;
            width: 100%;
        }

        header {
            margin-bottom: 80px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            line-height: 0;
        }

        .logo {
            display: block;
            height: 32px;
            width: auto;
        }

        .definition {
            font-size: 0.75rem;
            color: #000000;
            font-family: 'Noto Serif JP', serif;
            font-weight: 500;
        }

        section {
            margin-bottom: 60px;
        }

        p {
            margin: 0;
        }

        .creed-title {
            margin-bottom: 1.8rem;
            font-weight: 700;
            /* 下線を太くし、存在感を強調 */
            border-bottom: 2px solid #000000;
            display: inline-block;
            padding-bottom: 4px;
        }

        .creed-list {
            list-style: none;
            padding-left: 0;
            margin-top: 0.5rem;
            margin-bottom: 2.5rem;
        }

        .creed-list li {
            margin-bottom: 0.8rem;
            padding-left: 0.5rem;
        }

        /* ルビもはっきりと見えるように */
        ruby rt {
            font-size: 0.55em;
            letter-spacing: 0.05em;
            color: #000000;
            font-weight: 500;
        }

        footer {
            margin-top: 120px;
            font-size: 0.85rem;
            color: #000000;
            font-weight: 400;
        }

        @media (max-width: 480px) {
            article {
                padding: 30px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

<article>
    <header>
        <h1><img src="./assets/img/logo_catasumi.jpg" alt="cataniical" class="logo"></h1>
        <span class="definition">は「片隅ボタニカル」の略称です。</span>
    </header>

    <main>
        <section class="about">
            <p>都会の片隅で植物を育て、記録を残しています。</p>
        </section>

        <section class="creed">
            <p class="creed-title">規律 / Creed</p>
            <p>三つの信条</p>
            <ul class="creed-list">
                <li>一、<ruby>一掃一礼<rt>いっそういちれい</rt></ruby></li>
                <li>二、<ruby>吾唯知足<rt>われただたるをしる</rt></ruby></li>
                <li>三、<ruby>綿綿密密<rt>めんめんみつみつ</rt></ruby></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>その先にある静寂を、記録し続けます。</p>
    </footer>
</article>

</body>
</html>
